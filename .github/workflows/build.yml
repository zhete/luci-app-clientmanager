name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    name: Build for qualcommax-ipq60xx
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install opkg-build
        run: |
          wget -q https://raw.githubusercontent.com/openwrt/opkg-utils/master/opkg-build -O /usr/local/bin/opkg-build
          chmod +x /usr/local/bin/opkg-build

      - name: Build IPK package
        run: |
          # === 1. 创建 opkg-build 所需的目录结构 ===
          # opkg-build 使用 CONTROL/ 目录（不是 DEBIAN/）
          mkdir -p pkg/CONTROL
          mkdir -p pkg/usr/lib/lua/luci
          mkdir -p pkg/www
          
          # === 2. 复制实际文件 ===
          if [ -d "luasrc" ]; then
            cp -r luasrc/* pkg/usr/lib/lua/luci/
          fi
          
          if [ -d "root" ]; then
            cp -r root/* pkg/
          fi
          
          if [ -d "htdocs" ]; then
            cp -r htdocs/* pkg/www/
          fi
          
          # === 3. 创建 CONTROL/control 文件 ===
          echo "Package: luci-app-clientmanager" > pkg/CONTROL/control
          echo "Version: 1.0.0-1" >> pkg/CONTROL/control
          echo "Architecture: aarch64_cortex-a53" >> pkg/CONTROL/control
          echo "Section: luci" >> pkg/CONTROL/control
          echo "Priority: optional" >> pkg/CONTROL/control
          echo "Depends: libc, luci-lua-runtime" >> pkg/CONTROL/control
          echo "Maintainer: OpenWrt Community" >> pkg/CONTROL/control
          echo "Source: https://github.com/zhete/luci-app-clientmanager" >> pkg/CONTROL/control
          echo "Description: Client manager for OpenWrt/ImmortalWrt" >> pkg/CONTROL/control
          
          # === 4. 创建 postinst 脚本 ===
          echo '#!/bin/sh' > pkg/CONTROL/postinst
          echo 'rm -f /tmp/luci-indexcache /tmp/luci-modulecache/* 2>/dev/null' >> pkg/CONTROL/postinst
          echo 'exit 0' >> pkg/CONTROL/postinst
          chmod 755 pkg/CONTROL/postinst
          
          # === 5. 修正文件权限 ===
          find pkg/ -exec chmod 0644 {} +
          find pkg/ -type d -exec chmod 0755 {} +
          chmod 755 pkg/CONTROL/postinst
          find pkg/ -name "*.sh" -exec chmod 755 {} +
          
          # === 6. 使用 opkg-build 构建 .ipk ===
          mkdir -p output
          opkg-build -O -Z gzip pkg/ output/
          
          # === 7. 验证 ===
          echo "=== Output files ==="
          ls -la output/
          echo "=== ar archive contents ==="
          ar t output/*.ipk
          echo "=== control.tar.gz contents ==="
          ar p output/*.ipk control.tar.gz | tar tzf -
          echo "=== data.tar.gz sample ==="
          ar p output/*.ipk data.tar.gz | tar tzf - | head -20

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clientmanager-qualcommax-ipq60xx
          path: output/*.ipk
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
