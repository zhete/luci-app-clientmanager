name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    name: Build for qualcommax-ipq60xx
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build IPK package
        run: |
          # === 1. 准备文件目录 ===
          mkdir -p pkg/CONTROL
          mkdir -p pkg/usr/lib/lua/luci
          mkdir -p pkg/www
          
          if [ -d "luasrc" ]; then
            cp -r luasrc/* pkg/usr/lib/lua/luci/
          fi
          
          if [ -d "root" ]; then
            cp -r root/* pkg/
          fi
          
          if [ -d "htdocs" ]; then
            cp -r htdocs/* pkg/www/
          fi
          
          # === 2. 创建 CONTROL/control ===
          echo "Package: luci-app-clientmanager" > pkg/CONTROL/control
          echo "Version: 1.0.0-1" >> pkg/CONTROL/control
          echo "Architecture: aarch64_cortex-a53" >> pkg/CONTROL/control
          echo "Section: luci" >> pkg/CONTROL/control
          echo "Priority: optional" >> pkg/CONTROL/control
          echo "Depends: libc, luci-lua-runtime" >> pkg/CONTROL/control
          echo "Maintainer: OpenWrt Community" >> pkg/CONTROL/control
          echo "Source: https://github.com/zhete/luci-app-clientmanager" >> pkg/CONTROL/control
          echo "Description: Client manager for OpenWrt/ImmortalWrt" >> pkg/CONTROL/control
          
          # === 3. 创建 postinst ===
          echo '#!/bin/sh' > pkg/CONTROL/postinst
          echo 'rm -f /tmp/luci-indexcache /tmp/luci-modulecache/* 2>/dev/null' >> pkg/CONTROL/postinst
          echo 'exit 0' >> pkg/CONTROL/postinst
          chmod 755 pkg/CONTROL/postinst
          
          # === 4. 修正文件权限 ===
          find pkg/ -type d -exec chmod 0755 {} +
          find pkg/ -type f -exec chmod 0644 {} +
          chmod 755 pkg/CONTROL/postinst
          find pkg/ -name "*.sh" -exec chmod 755 {} +
          
          # === 5. 手动构建 .ipk（内联 opkg-build 逻辑） ===
          # .ipk = ar 归档，包含: debian-binary + control.tar.gz + data.tar.gz
          # 关键：control.tar.gz 和 data.tar.gz 都必须用 gzip 压缩
          
          WORKDIR=$(mktemp -d)
          
          # 5a. debian-binary
          printf '2.0\n' > "$WORKDIR/debian-binary"
          
          # 5b. control.tar.gz（进入 CONTROL 目录打包，确保路径以 ./ 开头）
          cd pkg/CONTROL
          tar czf "$WORKDIR/control.tar.gz" --owner=0 --group=0 --numeric-owner ./control ./postinst
          cd "$OLDPWD"
          
          # 5c. data.tar.gz（进入 pkg 目录打包，排除 CONTROL）
          cd pkg
          tar czf "$WORKDIR/data.tar.gz" --owner=0 --group=0 --numeric-owner --exclude='./CONTROL' .
          cd "$OLDPWD"
          
          # 5d. 用 ar 组装（成员顺序必须是: debian-binary, control.tar.gz, data.tar.gz）
          mkdir -p output
          ar rcs output/luci-app-clientmanager_1.0.0-1_aarch64_cortex-a53.ipk \
            "$WORKDIR/debian-binary" \
            "$WORKDIR/control.tar.gz" \
            "$WORKDIR/data.tar.gz"
          
          rm -rf "$WORKDIR"
          
          # === 6. 验证 ===
          echo "=== Output ==="
          ls -la output/
          echo "=== ar contents ==="
          ar t output/*.ipk
          echo "=== control.tar.gz ==="
          ar p output/*.ipk control.tar.gz | tar tzf -
          echo "=== data.tar.gz (first 20) ==="
          ar p output/*.ipk data.tar.gz | tar tzf - | head -20

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clientmanager-qualcommax-ipq60xx
          path: output/*.ipk
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
