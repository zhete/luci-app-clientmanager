name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    name: Build for qualcommax-ipq60xx
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build IPK package
        run: |
          # === 1. 准备 data 目录（实际安装的文件） ===
          mkdir -p data/usr/lib/lua/luci
          mkdir -p data/www
          
          if [ -d "luasrc" ]; then
            cp -r luasrc/* data/usr/lib/lua/luci/
          fi
          
          if [ -d "root" ]; then
            cp -r root/* data/
          fi
          
          if [ -d "htdocs" ]; then
            cp -r htdocs/* data/www/
          fi
          
          # === 2. 准备 control 目录（包元信息） ===
          mkdir -p control
          
          echo "Package: luci-app-clientmanager" > control/control
          echo "Version: 1.0.0-1" >> control/control
          echo "Depends: libc, luci-lua-runtime" >> control/control
          echo "Architecture: aarch64_cortex-a53" >> control/control
          echo "Section: luci" >> control/control
          echo "Priority: optional" >> control/control
          echo "Maintainer: OpenWrt Community" >> control/control
          echo "Source: https://github.com/zhete/luci-app-clientmanager" >> control/control
          echo "Description: Client manager for OpenWrt/ImmortalWrt" >> control/control
          
          echo "#!/bin/sh" > control/postinst
          echo 'rm -f /tmp/luci-indexcache /tmp/luci-modulecache/* 2>/dev/null' >> control/postinst
          chmod +x control/postinst
          
          # === 3. 打包为标准 .ipk 格式（ar 归档） ===
          # .ipk = ar 归档，内含 debian-binary + control.tar.gz + data.tar.gz
          
          # 3a. 创建 debian-binary
          printf '2.0\n' > debian-binary
          
          # 3b. 打包 control.tar.gz
          cd control
          tar czf ../control.tar.gz --owner=0 --group=0 --numeric-owner ./control ./postinst
          cd ..
          
          # 3c. 打包 data.tar.gz
          cd data
          tar czf ../data.tar.gz --owner=0 --group=0 --numeric-owner .
          cd ..
          
          # 3d. 用 ar 组装 .ipk
          mkdir -p output
          ar r output/luci-app-clientmanager_1.0.0-1_aarch64_cortex-a53.ipk debian-binary control.tar.gz data.tar.gz
          
          # === 4. 验证 ===
          echo "=== IPK contents ==="
          ar t output/luci-app-clientmanager_1.0.0-1_aarch64_cortex-a53.ipk
          echo "=== File size ==="
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clientmanager-qualcommax-ipq60xx
          path: output/*.ipk
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
