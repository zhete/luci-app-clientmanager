name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    name: Build for qualcommax-ipq60xx
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build IPK package
        run: |
          # === 1. 创建 dpkg-deb 所需的目录结构 ===
          # dpkg-deb 使用 DEBIAN/ 目录存放控制信息
          mkdir -p pkg/DEBIAN
          mkdir -p pkg/usr/lib/lua/luci
          mkdir -p pkg/www
          
          # === 2. 复制实际文件 ===
          if [ -d "luasrc" ]; then
            cp -r luasrc/* pkg/usr/lib/lua/luci/
          fi
          
          if [ -d "root" ]; then
            cp -r root/* pkg/
          fi
          
          if [ -d "htdocs" ]; then
            cp -r htdocs/* pkg/www/
          fi
          
          # === 3. 创建 DEBIAN/control 文件 ===
          echo "Package: luci-app-clientmanager" > pkg/DEBIAN/control
          echo "Version: 1.0.0-1" >> pkg/DEBIAN/control
          echo "Architecture: aarch64_cortex-a53" >> pkg/DEBIAN/control
          echo "Section: luci" >> pkg/DEBIAN/control
          echo "Priority: optional" >> pkg/DEBIAN/control
          echo "Depends: libc, luci-lua-runtime" >> pkg/DEBIAN/control
          echo "Maintainer: OpenWrt Community" >> pkg/DEBIAN/control
          echo "Source: https://github.com/zhete/luci-app-clientmanager" >> pkg/DEBIAN/control
          echo "Description: Client manager for OpenWrt/ImmortalWrt" >> pkg/DEBIAN/control
          
          # === 4. 创建 postinst 脚本 ===
          echo '#!/bin/sh' > pkg/DEBIAN/postinst
          echo 'rm -f /tmp/luci-indexcache /tmp/luci-modulecache/* 2>/dev/null' >> pkg/DEBIAN/postinst
          echo 'exit 0' >> pkg/DEBIAN/postinst
          chmod 755 pkg/DEBIAN/postinst
          
          # === 5. 使用 dpkg-deb 构建标准 .ipk 包 ===
          # .ipk 和 .deb 格式完全相同（ar 归档）
          # -Zgzip 强制使用 gzip 压缩（opkg 不支持 zstd）
          mkdir -p output
          dpkg-deb -Zgzip --build pkg output/luci-app-clientmanager_1.0.0-1_aarch64_cortex-a53.ipk
          
          # === 6. 验证包格式 ===
          echo "=== IPK file info ==="
          ls -la output/
          echo "=== ar archive contents ==="
          ar t output/luci-app-clientmanager_1.0.0-1_aarch64_cortex-a53.ipk
          echo "=== control.tar.gz contents ==="
          ar p output/luci-app-clientmanager_1.0.0-1_aarch64_cortex-a53.ipk control.tar.gz | tar tzf -
          echo "=== data.tar.gz sample ==="
          ar p output/luci-app-clientmanager_1.0.0-1_aarch64_cortex-a53.ipk data.tar.gz | tar tzf - | head -20

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clientmanager-qualcommax-ipq60xx
          path: output/*.ipk
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
