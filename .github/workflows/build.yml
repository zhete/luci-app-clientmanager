name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt SDK version'
        required: true
        default: '23.05.5'
        type: string
      target:
        description: 'Target architecture'
        required: true
        default: 'x86-64'
        type: string

env:
  OPENWRT_VERSION: ${{ github.event.inputs.openwrt_version || '23.05.5' }}
  PKG_NAME: luci-app-clientmanager

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86-64
            openwrt_path: x86/64
            openwrt_target: x86-64
            gcc_ver: 12.3.0
          - target: aarch64_generic
            openwrt_path: armvirt/64
            openwrt_target: armvirt-64
            gcc_ver: 12.3.0
          - target: ramips-mt7621
            openwrt_path: ramips/mt7621
            openwrt_target: ramips-mt7621
            gcc_ver: 12.3.0

    name: Build for ${{ matrix.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            g++-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3-setuptools \
            python3-jinja2 \
            python3-yaml \
            rsync \
            swig \
            unzip \
            zlib1g-dev \
            file \
            wget \
            xsltproc

      - name: Download OpenWrt SDK
        run: |
          VERSION="${{ env.OPENWRT_VERSION }}"
          OPENWRT_PATH="${{ matrix.openwrt_path }}"
          OPENWRT_TARGET="${{ matrix.openwrt_target }}"
          GCC_VER="${{ matrix.gcc_ver }}"
          
          OPENWRT_SDK_FILE="openwrt-sdk-${VERSION}-${OPENWRT_TARGET}_gcc-${GCC_VER}_musl.Linux-x86_64.tar.xz"
          IMMORTAL_SDK_FILE="immortalwrt-sdk-${VERSION}-${OPENWRT_TARGET}_gcc-${GCC_VER}_musl.Linux-x86_64.tar.xz"
          
          OPENWRT_URL="https://downloads.openwrt.org/releases/${VERSION}/targets/${OPENWRT_PATH}/${OPENWRT_SDK_FILE}"
          IMMORTAL_URL="https://downloads.immortalwrt.org/releases/${VERSION}/targets/${OPENWRT_PATH}/${IMMORTAL_SDK_FILE}"
          
          echo "Trying OpenWrt official: $OPENWRT_URL"
          if wget -q --show-progress --tries=3 "$OPENWRT_URL" -O sdk.tar.xz; then
            echo "Successfully downloaded OpenWrt SDK"
          elif wget -q --show-progress --tries=3 "$IMMORTAL_URL" -O sdk.tar.xz; then
            echo "Successfully downloaded ImmortalWrt SDK"
          elif wget -q --show-progress --tries=3 "https://mirror.ghproxy.com/${OPENWRT_URL}" -O sdk.tar.xz; then
            echo "Successfully downloaded from mirror"
          else
            echo "Failed to download SDK from all sources"
            exit 1
          fi

      - name: Extract SDK
        run: |
          tar -xf sdk.tar.xz
          SDK_DIR=$(find . -maxdepth 1 -type d -name "*sdk*" | head -1)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "SDK directory: $SDK_DIR"
          ls -la "$SDK_DIR"

      - name: Prepare package source
        run: |
          SDK_DIR="${{ env.SDK_DIR }}"
          PKG_DIR="${SDK_DIR}/package/${{ env.PKG_NAME }}"
          mkdir -p "$PKG_DIR"
          
          cp -r Makefile "$PKG_DIR/"
          cp -r luasrc "$PKG_DIR/"
          cp -r root "$PKG_DIR/"
          cp -r po "$PKG_DIR/"
          
          if [ -d htdocs ]; then
            cp -r htdocs "$PKG_DIR/"
          fi
          
          echo "Package directory contents:"
          find "$PKG_DIR" -type f | head -30

      - name: Build package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          make package/${{ env.PKG_NAME }}/compile V=s

      - name: Find IPK files
        id: find_ipk
        run: |
          SDK_DIR="${{ env.SDK_DIR }}"
          IPK_FILES=$(find "$SDK_DIR/bin" -name "*.ipk" -type f 2>/dev/null || true)
          
          if [ -z "$IPK_FILES" ]; then
            IPK_FILES=$(find "$SDK_DIR" -name "${{ env.PKG_NAME }}*.ipk" -type f 2>/dev/null || true)
          fi
          
          echo "Found IPK files:"
          echo "$IPK_FILES"
          
          mkdir -p output
          for f in $IPK_FILES; do
            cp "$f" output/
            echo "Copied: $(basename $f)"
          done
          
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PKG_NAME }}-${{ env.OPENWRT_VERSION }}-${{ matrix.target }}
          path: output/*.ipk
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f -name "*.ipk" | sort

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
          body: |
            ## luci-app-clientmanager ${{ github.ref_name }}
            
            ### Installation
            ```bash
            opkg install luci-app-clientmanager_*.ipk
            ```
            
            ### Supported architectures
            - x86-64
            - aarch64_generic
            - ramips-mt7621
