name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    name: Build for qualcommax-ipq60xx
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build IPK package
        run: |
          # === 1. 准备文件目录 ===
          mkdir -p data/usr/lib/lua/luci
          mkdir -p data/www
          mkdir -p control
          
          if [ -d "luasrc" ]; then
            cp -r luasrc/* data/usr/lib/lua/luci/
          fi
          
          if [ -d "root" ]; then
            cp -r root/* data/
          fi
          
          if [ -d "htdocs" ]; then
            cp -r htdocs/* data/www/
          fi
          
          # === 2. 创建 control 文件 ===
          echo "Package: luci-app-clientmanager" > control/control
          echo "Version: 1.0.0-1" >> control/control
          echo "Architecture: aarch64_cortex-a53" >> control/control
          echo "Section: luci" >> control/control
          echo "Priority: optional" >> control/control
          echo "Depends: libc, luci-lua-runtime" >> control/control
          echo "Maintainer: OpenWrt Community" >> control/control
          echo "Source: https://github.com/zhete/luci-app-clientmanager" >> control/control
          echo "Description: Client manager for OpenWrt/ImmortalWrt" >> control/control
          
          # === 3. 创建 postinst ===
          echo '#!/bin/sh' > control/postinst
          echo 'rm -f /tmp/luci-indexcache /tmp/luci-modulecache/* 2>/dev/null' >> control/postinst
          echo 'exit 0' >> control/postinst
          chmod 755 control/postinst
          
          # === 4. 修正文件权限 ===
          find data/ -type d -exec chmod 0755 {} +
          find data/ -type f -exec chmod 0644 {} +
          find control/ -type d -exec chmod 0755 {} +
          find control/ -type f -exec chmod 0644 {} +
          chmod 755 control/postinst
          find data/ -name "*.sh" -exec chmod 755 {} +
          
          # === 5. 打包 control.tar.gz 和 data.tar.gz ===
          cd control
          tar --owner=0 --group=0 -czf ../control.tar.gz ./*
          cd ..
          
          cd data
          tar --owner=0 --group=0 -czf ../data.tar.gz ./*
          cd ..
          
          # === 6. 用 Python 手动构建 ar 归档（确保格式完全兼容 opkg） ===
          mkdir -p output
          
          # 创建 debian-binary
          printf '2.0\n' > debian-binary
          
          python3 -c "
          import os
          
          def ar_header(name, size, mtime=0):
              name = name + '/'
              return '{:<16}{:<12}{:<6}{:<6}{:<8}{:<10}\x60\x0a'.format(
                  name, mtime, 0, 0, '100644', size)
          
          files = ['debian-binary', 'control.tar.gz', 'data.tar.gz']
          
          with open('output/luci-app-clientmanager_1.0.0-1_aarch64_cortex-a53.ipk', 'wb') as out:
              out.write(b'!<arch>\n')
              for fname in files:
                  data = open(fname, 'rb').read()
                  out.write(ar_header(fname, len(data)).encode('ascii'))
                  out.write(data)
                  if len(data) % 2 != 0:
                      out.write(b'\n')
          "
          
          # === 7. 验证 ===
          echo "=== Output ==="
          ls -la output/
          echo "=== Verify with ar ==="
          ar t output/*.ipk || echo "ar verify failed"
          echo "=== Verify debian-binary ==="
          ar p output/*.ipk debian-binary || echo "extract debian-binary failed"
          echo "=== control.tar.gz contents ==="
          ar p output/*.ipk control.tar.gz | tar tzf -
          echo "=== data.tar.gz (first 20) ==="
          ar p output/*.ipk data.tar.gz | tar tzf - | head -20

      - name: Upload artifacts
        uses: actions/upload-artifact@v4.6.2
        with:
          name: luci-app-clientmanager-qualcommax-ipq60xx
          path: output/*.ipk
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
