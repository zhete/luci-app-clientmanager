name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        include:
          # ImmortalWrt 23.05 for aarch64_cortex-a53
          - sdk_url: https://downloads.immortalwrt.org/releases/23.05.4/targets/qualcommax/ipq60xx/immortalwrt-sdk-qualcommax-ipq60xx_gcc-12.3.0_musl.Linux-x86_64.tar.zst
            arch: aarch64_cortex-a53
            name: ImmortalWrt-23.05.4-qualcommax-ipq60xx
    
    name: Build for ${{ matrix.name }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download and extract SDK
        run: |
          wget -q ${{ matrix.sdk_url }} -O sdk.tar.zst
          zstd -d sdk.tar.zst
          tar -xf sdk.tar
          # 重命名 SDK 目录
          mv immortalwrt-sdk-* sdk
          echo "SDK_DIR=$(pwd)/sdk" >> $GITHUB_ENV

      - name: Prepare package
        run: |
          # 创建 package 目录
          mkdir -p $SDK_DIR/package/luci-app-clientmanager
          
          # 复制项目文件
          cp -r Makefile $SDK_DIR/package/luci-app-clientmanager/
          cp -r luasrc $SDK_DIR/package/luci-app-clientmanager/
          cp -r root $SDK_DIR/package/luci-app-clientmanager/
          cp -r po $SDK_DIR/package/luci-app-clientmanager/
          
          # 如果有 htdocs 目录也复制
          if [ -d "htdocs" ]; then
            cp -r htdocs $SDK_DIR/package/luci-app-clientmanager/
          fi

      - name: Build package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          # 更新 feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 配置 - 启用我们的包
          echo "CONFIG_PACKAGE_luci-app-clientmanager=y" >> .config
          echo "CONFIG_ALL=y" >> .config
          make defconfig
          
          # 编译包
          make package/luci-app-clientmanager/compile V=s -j$(nproc) || make package/luci-app-clientmanager/compile V=s

      - name: Find and copy IPK
        run: |
          # 查找生成的 ipk 文件
          IPK_FILE=$(find $SDK_DIR/bin -name "luci-app-clientmanager*.ipk" | head -1)
          
          if [ -z "$IPK_FILE" ]; then
            echo "Error: No IPK file found"
            exit 1
          fi
          
          echo "Found IPK: $IPK_FILE"
          
          # 创建输出目录
          mkdir -p output
          
          # 复制 ipk 文件，使用标准命名
          cp "$IPK_FILE" output/
          
          # 显示文件信息
          ls -lh output/
          
          # 验证 ipk 文件
          file output/*.ipk

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: output/*.ipk
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
