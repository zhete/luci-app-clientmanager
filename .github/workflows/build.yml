name: Build OpenWrt Package

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    name: Build for qualcommax-ipq60xx
    
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Prepare build
        run: |
          mkdir -p pkg_build/usr/lib/lua/luci
          mkdir -p pkg_build/www
          mkdir -p pkg_build/CONTROL
          
          if [ -d "luasrc" ]; then
            cp -r luasrc/* pkg_build/usr/lib/lua/luci/
          fi
          
          if [ -d "root" ]; then
            cp -r root/* pkg_build/
          fi
          
          if [ -d "htdocs" ]; then
            cp -r htdocs/* pkg_build/www/
          fi
          
          echo "Package: luci-app-clientmanager" > pkg_build/CONTROL/control
          echo "Version: 1.0.0-1" >> pkg_build/CONTROL/control
          echo "Architecture: aarch64_cortex-a53" >> pkg_build/CONTROL/control
          echo "Section: luci" >> pkg_build/CONTROL/control
          echo "Priority: optional" >> pkg_build/CONTROL/control
          echo "Maintainer: OpenWrt Community" >> pkg_build/CONTROL/control
          echo "Source: https://github.com/zhete/luci-app-clientmanager" >> pkg_build/CONTROL/control
          echo "Description: Client manager for OpenWrt/ImmortalWrt" >> pkg_build/CONTROL/control
          
          echo "#!/bin/sh" > pkg_build/CONTROL/postinst
          echo '[ "$1" = "configure" ] || exit 0' >> pkg_build/CONTROL/postinst
          echo "rm -f /tmp/luci-indexcache 2>/dev/null" >> pkg_build/CONTROL/postinst
          echo "exit 0" >> pkg_build/CONTROL/postinst
          chmod +x pkg_build/CONTROL/postinst
          
          mkdir -p output
          
          cd pkg_build
          tar czf ../output/luci-app-clientmanager_1.0.0-1_aarch64_cortex-a53.ipk --owner=0 --group=0 --numeric-owner .
          cd ..
          
          ls -la output/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-clientmanager-qualcommax-ipq60xx
          path: output/*.ipk
          retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*.ipk
          generate_release_notes: true
